                <p class="text-xs text-slate-400 mb-6">Mix colors, slide the angle, and export custom CSS code.</p>

                <div class="space-y-4">

                    <div class="grid grid-cols-2 gap-4">
                        <!-- Color 1 -->
                        <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-800 flex items-center justify-between">
                            <span class="text-sm font-mono text-slate-400" id="hexText1">#3b82f6</span>
                            <input type="color" id="colorInput1" value="#3b82f6" class="w-10 h-10 bg-transparent border-0 cursor-pointer rounded overflow-hidden">
                        </div>
                        <!-- Color 2 -->
                        <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-800 flex items-center justify-between">
                            <span class="text-sm font-mono text-slate-400" id="hexText2">#8b5cf6</span>
                            <input type="color" id="colorInput2" value="#8b5cf6" class="w-10 h-10 bg-transparent border-0 cursor-pointer rounded overflow-hidden">
                        </div>
                    </div>
                </div>

                <!-- Gradient Angle Slider -->
                <div class="mt-8 space-y-3">
                    <div class="flex justify-between items-center">
                        <label for="angleSlider" class="text-sm font-semibold tracking-wide uppercase text-slate-400">Rotation Alignment</label>
                        <span class="bg-slate-900 px-2 py-0.5 rounded font-mono text-xs text-cyan-400 border border-slate-800" id="angleValue">135°</span>
                    </div>
                    <input type="range" id="angleSlider" min="0" max="360" value="135" class="w-full accent-cyan-400 h-2 bg-slate-900 rounded-lg appearance-none cursor-pointer">
                </div>
            </div>

            <!-- CSS Export Display Box -->
            <div class="space-y-2 mt-auto">
                <label class="block text-xs font-semibold tracking-wide uppercase text-slate-400">Generated CSS Code</label>
                <div class="relative bg-slate-950 rounded-xl border border-slate-800 p-4 font-mono text-xs text-emerald-400 break-all select-all pr-12 cursor-pointer group" id="cssOutputContainer" title="Click anywhere inside box to copy code">
                    <code id="cssCodeText">background: linear-gradient(135deg, #3b82f6, #8b5cf6);</code>
                    <button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 group-hover:text-white transition">
                        <i class="fa-regular fa-copy text-base"></i>
                    </button>
                </div>
            </div>
        </section>
